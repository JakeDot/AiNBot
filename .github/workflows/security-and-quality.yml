name: Security & Code Quality Checks

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=moderate
        continue-on-error: true
      - run: npx tsc --noEmit
        continue-on-error: true

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint -- --format json > lint-report.json
        continue-on-error: true
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lint-report
          path: lint-report.json
          retention-days: 30
      - run: npm test -- --coverage --passWithNoTests
        continue-on-error: true
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
        continue-on-error: true

  dependency-check:
    name: Dependency Updates Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm outdated || true
      - run: |
          echo "## Critical Dependencies" >> $GITHUB_STEP_SUMMARY
          npm list @anthropic-ai/sdk obsidian >> $GITHUB_STEP_SUMMARY

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
      - run: |
          files=("main.js" "main.d.ts" "manifest.json" "styles.css")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
      - run: npm test -- integration-tests/plugin-integration.test.ts --passWithNoTests
        continue-on-error: true
